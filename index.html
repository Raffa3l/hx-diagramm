<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>h,x-Diagramm für feuchte Luft</title>
  <meta name="description" content="Interaktives Mollier h,x-Diagramm für feuchte Luft: Zustandspunkte, Prozesslinien und psychrometrische Berechnungen im Browser.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2213%22 font-size=%2213%22>💧</text></svg>">
  <link rel="stylesheet" href="./src/style.css">
  <script type="importmap">
  {
    "imports": {
      "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1>h,x-Diagramm</h1>
      <p class="subtitle">Mollier-Diagramm für feuchte Luft</p>

      <section class="panel">
        <h2>Konfiguration</h2>
        <div class="form-group">
          <label for="altitude">Höhe ü. M. (m)</label>
          <input type="number" id="altitude" value="500" min="0" max="4000" step="50">
          <span class="hint" id="pressure-display">≈ 955 mbar</span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="t-min">T min (°C)</label>
            <input type="number" id="t-min" value="-10" min="-40" max="0" step="5">
          </div>
          <div class="form-group">
            <label for="t-max">T max (°C)</label>
            <input type="number" id="t-max" value="50" min="20" max="80" step="5">
          </div>
        </div>
        <div class="form-group">
          <label for="x-max">x max (g/kg)</label>
          <input type="number" id="x-max" value="30" min="10" max="50" step="5">
        </div>
        <div class="form-group form-check">
          <label for="show-comfort">
            <input type="checkbox" id="show-comfort">
            Behaglichkeitszonen anzeigen
          </label>
        </div>
        <button id="btn-update-config" class="btn btn-primary">Diagramm aktualisieren</button>
      </section>

      <section class="panel">
        <h2>Zustandspunkt hinzufügen</h2>
        <div class="form-group">
          <label for="input-t">Temperatur T (°C)</label>
          <input type="number" id="input-t" value="20" step="0.5">
        </div>
        <div class="form-group">
          <label for="input-mode">Eingabe über</label>
          <select id="input-mode">
            <option value="phi">Relative Feuchte φ (%)</option>
            <option value="x">Absolute Feuchte x (g/kg)</option>
          </select>
        </div>
        <div class="form-group" id="phi-input-group">
          <label for="input-phi">Relative Feuchte φ (%)</label>
          <input type="number" id="input-phi" value="50" min="0" max="100" step="1">
        </div>
        <div class="form-group hidden" id="x-input-group">
          <label for="input-x">Absolute Feuchte x (g/kg)</label>
          <input type="number" id="input-x" value="7" min="0" step="0.1">
        </div>
        <button id="btn-add-point" class="btn btn-primary">Punkt hinzufügen</button>
        <span class="hint hint-error hidden" id="add-point-hint"></span>
      </section>

      <section class="panel">
        <h2>Luftstrom &amp; Leistung</h2>
        <div class="form-group">
          <label for="flow-type">Angabe als</label>
          <select id="flow-type">
            <option value="mass">Massenstrom ṁ</option>
            <option value="volume">Volumenstrom V̇</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="flow-value">Wert</label>
            <input type="number" id="flow-value" min="0" step="any" placeholder="z.B. 3600">
          </div>
          <div class="form-group">
            <label for="flow-unit">Einheit</label>
            <select id="flow-unit"></select>
          </div>
        </div>
        <span class="hint">ṁ bezogen auf trockene Luft; V̇ wird mit ρ und x am Abschnittsanfang umgerechnet.</span>
        <div id="power-results"></div>
      </section>

      <section class="panel">
        <h2>Zustandspunkte</h2>
        <div id="points-list"></div>
        <button id="btn-clear-points" class="btn btn-danger">Alle löschen</button>
      </section>

      <footer id="app-footer">
        <span>Entwickelt von Raffa3l</span>
        <a href="https://github.com/Raffa3l/hx-diagramm" target="_blank" rel="noopener" aria-label="GitHub-Repository hx-diagramm">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
          </svg>
          GitHub
        </a>
      </footer>
    </aside>
    <main id="diagram-container"></main>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
